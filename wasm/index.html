<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>rlib-MML Web App</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        max-width: 1080px;
        margin: 0 auto;
        padding: 16px;
        font-family: sans-serif;
      }
      #mml {
        width: 100%;
        min-height: 60vh;
        box-sizing: border-box;
      }
      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      #status {
        margin-top: 10px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>rlib-MML Web App</h1>
    <p>MML と SMF の相互変換をブラウザで行います。</p>

    <textarea id="mml" placeholder="ここに MML を入力"></textarea>
    <div class="row">
      <button id="toSmf">MML → SMF を作成</button>
      <label>SMF → MML: <input id="smfFile" type="file" accept=".mid,.midi" /></label>
    </div>
    <div id="status"></div>

    <script async type="text/javascript" src="./rlibmml.js"></script>
    <script>
      const statusEl = document.getElementById("status");
      const setStatus = (msg, isError = false) => {
        statusEl.textContent = msg;
        statusEl.style.color = isError ? "crimson" : "";
      };

      let modulePromise;
      const getModule = async () => {
        if (!modulePromise) {
          modulePromise = Module();
        }
        return modulePromise;
      };

      const normalizeError = (errorValue) => {
        if (typeof errorValue === "string") return errorValue;
        try {
          return JSON.stringify(errorValue, null, 2);
        } catch (_) {
          return String(errorValue);
        }
      };

      document.getElementById("toSmf").addEventListener("click", async () => {
        try {
          setStatus("変換中...");
          const module = await getModule();
          const mml = document.getElementById("mml").value;
          const result = module.mmlToSmf(mml);
          if (result.error) {
            setStatus(`MML -> SMF 変換エラー\n${normalizeError(result.error)}`, true);
            return;
          }
          const bytes = result.result;
          const blob = new Blob([bytes], { type: "audio/midi" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "output.mid";
          a.click();
          URL.revokeObjectURL(url);
          setStatus("output.mid をダウンロードしました。");
        } catch (e) {
          setStatus(`例外: ${e?.message || e}`, true);
        }
      });

      document.getElementById("smfFile").addEventListener("change", async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        try {
          setStatus("変換中...");
          const buffer = await file.arrayBuffer();
          const module = await getModule();
          const result = module.smfToMml(new Uint8Array(buffer));
          if (!result.ok) {
            setStatus(`SMF -> MML 変換エラー\n${result.message || "unknown error"}`, true);
            return;
          }
          document.getElementById("mml").value = result.result;
          setStatus("SMF -> MML 変換が完了しました。");
        } catch (e) {
          setStatus(`例外: ${e?.message || e}`, true);
        }
      });
    </script>
  </body>
</html>
